name: Weekly Full Collect
on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  full-collect:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "collector/.[dev]"
      - name: Full collect
        env:
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python -m modelinfo.cli collect all
      - name: Commit change log
        run: |
          mkdir -p logs
          git config user.name "modelinfo-bot"
          git config user.email "bot@modelinfo"
          git add logs/change_log.md logs/errors.jsonl 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            git commit -m "chore: weekly full collect $(date +%Y-%m-%d)"
            git push
          fi
